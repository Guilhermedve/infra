name: ci 

on: 
  push: 
    branches: 
      - main
  pull_request: 
    branches: 
      - main


jobs: 
  build: 
    name: "build and push docker image"
    runs-on: ubuntu-latest

    steps: 
    - name: Checkout code
      uses: actions/checkout@v3

    -name: Setup node 
       uses: actions/setup-node@v3
    with: 
        node-version: {{ matrix.node-version }}
        cache: "npm"
        

