name: ci 

on: 
  push: 
    branches: 
      - main
  pull_request: 
    branches: 
      - main


jobs: 
  build: 
    name: "build and push docker image"
    runs-on: ubuntu-latest

    steps: 
    - name: Checkout code
      uses: actions/checkout@v3

- name: Setup node 
uses: actions/setup-node@v3
with: 
  node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Build docker image
      run: docker build -t infra-project-name:dev ./project-name

    - name: Push docker image to Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: ./project-name
        push: true
        tags: your-dockerhub-username/infra-project-name:dev